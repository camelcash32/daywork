<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAYWORK — Offline</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8c547">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 320px; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #e8c547; font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
    p { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #e8c547;
      color: #080808;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>DAYWORK</h1>
    <p>You're offline. Check your connection and try again — jobs are waiting!</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
